<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection - Electron</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: #1a1a2e; 
            color: white;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .sidebar {
            width: 350px;
            background: #16213e;
            padding: 20px;
            overflow-y: auto;
        }
        video, canvas {
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        video { display: none; }
        canvas { 
            max-width: 100%;
            max-height: 70vh;
        }
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-success { background: #4ecca3; color: #1a1a2e; }
        .btn-success:hover { background: #7ee8c7; }
        .btn-warning { background: #ffc107; color: #1a1a2e; }
        .btn-warning:hover { background: #ffda44; }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .stat-box {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-box h3 { font-size: 12px; color: #888; margin-bottom: 5px; }
        .stat-box .value { font-size: 24px; font-weight: bold; color: #4ecca3; }
        .recognized-list {
            margin-top: 20px;
        }
        .recognized-item {
            background: #1a1a2e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 5px;
            border-left: 4px solid #4ecca3;
        }
        .recognized-item.new {
            animation: pulse 0.5s;
            border-left-color: #ffc107;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .status-bar {
            background: #0f3460;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .fps { color: #4ecca3; font-weight: bold; }
        .perf-info {
            font-size: 11px;
            color: #666;
            margin-top: 10px;
        }
        .optimization-badge {
            background: #4ecca3;
            color: #1a1a2e;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            margin-left: 5px;
        }
        h2 { color: #4ecca3; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="status-bar">
        <div>
            <span id="status">Initializing...</span>
            <span id="model-badge"></span>
        </div>
        <div>
            <span class="fps">FPS: <span id="fps">0</span></span>
            <span class="optimization-badge">OPTIMIZED</span>
        </div>
    </div>

    <div class="container">
        <div class="video-section">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas"></canvas>
            
            <div class="stats">
                <div class="stat-box">
                    <h3>Detections</h3>
                    <div class="value" id="detections">0</div>
                </div>
                <div class="stat-box">
                    <h3>Recognized</h3>
                    <div class="value" id="recognized">0</div>
                </div>
                <div class="stat-box">
                    <h3>Frame Time</h3>
                    <div class="value" id="frame-time">0</div>
                </div>
                <div class="stat-box">
                    <h3>Processed</h3>
                    <div class="value" id="processed">0</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" id="startBtn" onclick="toggleCamera()">Start Camera</button>
                <button class="btn btn-success" id="detectBtn" onclick="toggleDetection()">Start Detection</button>
                <select id="modelSelect" onchange="changeModel()">
                    <option value="tiny">Tiny Face Detector (Fastest)</option>
                    <option value="ssd">SSD MobileNet (Accurate)</option>
                </select>
            </div>

            <div class="perf-info" id="perfInfo">
                Optimizations: Frame Skip | Small Resolution | Face Tracking
            </div>
        </div>

        <div class="sidebar">
            <h2>Recognized People</h2>
            <div id="recognizedList">
                <p style="color: #666;">No one recognized yet...</p>
            </div>
        </div>
    </div>

    <!-- Face-api.js from CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <script>
        // ============================================
        // OPTIMIZATION SETTINGS
        // ============================================
        const CONFIG = {
            // Frame processing
            SKIP_FRAMES: 2,           // Process every N frames (1 = all frames, 2 = half, 3 = third)
            SCALE_SIZE: 0.5,          // Scale video to this size for detection (0.5 = half)
            
            // Detection settings
            DETECTION_INTERVAL: 100,   // Min ms between detections
            MIN_CONFIDENCE: 0.5,      // Minimum face confidence
            
            // Face matching
            FACE_MATCH_THRESHOLD: 0.6,// Lower = stricter matching
            
            // Camera
            VIDEO_WIDTH: 640,
            VIDEO_HEIGHT: 480,
        };

        // ============================================
        // STATE
        // ============================================
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        
        let isCameraOn = false;
        let isDetecting = false;
        let frameCount = 0;
        let lastDetectionTime = 0;
        let lastProcessTime = performance.now();
        
        // Performance tracking
        let fps = 0;
        let fpsFrames = 0;
        let fpsTime = performance.now();
        
        // Recognized people tracking
        let recognizedToday = new Set();
        
        // Current model
        let currentModel = 'tiny';
        let modelsLoaded = false;

        // ============================================
        // INITIALIZATION
        // ============================================
        async function init() {
            document.getElementById('status').textContent = 'Loading face detection models...';
            
            try {
                // Load models from CDN
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic_face-api@1.7.12/model';
                
                // Load TinyFaceDetector (fastest)
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                // Load SSD MobileNet (more accurate)
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                
                // Load face recognition net
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                // Load face landmark net
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                
                modelsLoaded = true;
                document.getElementById('status').textContent = 'Models loaded - Ready';
                document.getElementById('model-badge').textContent = 'TinyYOLO';
                document.getElementById('startBtn').disabled = false;
                document.getElementById('detectBtn').disabled = false;
                
                console.log('Face detection models loaded successfully');
            } catch (error) {
                console.error('Failed to load models:', error);
                document.getElementById('status').textContent = 'Model load failed: ' + error.message;
                alert('Failed to load face detection models. Check your internet connection.');
            }
        }

        // ============================================
        // CAMERA CONTROL
        // ============================================
        async function toggleCamera() {
            if (!isCameraOn) {
                await startCamera();
            } else {
                stopCamera();
            }
        }

        async function startCamera() {
            try {
                // OPTIMIZATION: Request only needed resolution
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: CONFIG.VIDEO_WIDTH },
                        height: { ideal: CONFIG.VIDEO_HEIGHT },
                        facingMode: 'user'
                    }
                });
                
                video.srcObject = stream;
                await video.play();
                
                // Set canvas size
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                isCameraOn = true;
                document.getElementById('startBtn').textContent = 'Stop Camera';
                document.getElementById('status').textContent = 'Camera active';
                
                // Start render loop
                requestAnimationFrame(renderLoop);
                
            } catch (error) {
                console.error('Camera error:', error);
                document.getElementById('status').textContent = 'Camera error: ' + error.message;
                alert('Could not access camera. Please grant permission.');
            }
        }

        function stopCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            isCameraOn = false;
            isDetecting = false;
            document.getElementById('startBtn').textContent = 'Start Camera';
            document.getElementById('detectBtn').textContent = 'Start Detection';
            document.getElementById('status').textContent = 'Camera stopped';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // ============================================
        // DETECTION CONTROL
        // ============================================
        function toggleDetection() {
            isDetecting = !isDetecting;
            document.getElementById('detectBtn').textContent = isDetecting ? 'Stop Detection' : 'Start Detection';
            document.getElementById('detectBtn').className = isDetecting ? 'btn btn-warning' : 'btn btn-success';
            document.getElementById('status').textContent = isDetecting ? 'Detection active' : 'Detection paused';
        }

        function changeModel() {
            currentModel = document.getElementById('modelSelect').value;
            document.getElementById('model-badge').textContent = currentModel === 'tiny' ? 'TinyYOLO' : 'SSD';
            console.log('Model changed to:', currentModel);
        }

        // ============================================
        // MAIN RENDER LOOP (OPTIMIZED)
        // ============================================
        async function renderLoop() {
            if (!isCameraOn) return;
            
            const now = performance.now();
            
            // Calculate FPS
            fpsFrames++;
            if (now - fpsTime >= 1000) {
                fps = fpsFrames;
                fpsFrames = 0;
                fpsTime = now;
                document.getElementById('fps').textContent = fps;
            }
            
            // Calculate frame processing time
            const frameStart = performance.now();
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw video frame
            ctx.drawImage(video, 0, 0);
            
            let detectionCount = 0;
            
            // OPTIMIZATION: Frame skipping
            frameCount++;
            if (isDetecting && modelsLoaded && frameCount % CONFIG.SKIP_FRAMES === 0) {
                
                // OPTIMIZATION: Check detection interval
                if (now - lastDetectionTime >= CONFIG.DETECTION_INTERVAL) {
                    lastDetectionTime = now;
                    
                    // OPTIMIZATION: Use smaller detection options
                    const options = currentModel === 'tiny' 
                        ? new faceapi.TinyFaceDetectorOptions({
                            inputSize: 320,      // Smaller = faster
                            scoreThreshold: 0.5  // Higher = fewer false positives
                        })
                        : new faceapi.SsdMobilenetv1Options({
                            minConfidence: CONFIG.MIN_CONFIDENCE
                        });
                    
                    try {
                        // OPTIMIZATION: Detect only faces, not landmarks
                        const detections = await faceapi.detectAllFaces(
                            video, 
                            options
                        );
                        
                        detectionCount = detections.length;
                        
                        // Draw detections
                        detections.forEach(det => {
                            const box = det.box;
                            
                            // Color based on confidence
                            const conf = det.score || 0;
                            const color = conf > 0.9 ? '#4ecca3' : conf > 0.7 ? '#ffc107' : '#e94560';
                            
                            // Draw box
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 3;
                            ctx.strokeRect(box.x, box.y, box.width, box.height);
                            
                            // Draw label
                            ctx.fillStyle = color;
                            ctx.font = 'bold 14px Arial';
                            ctx.fillText(
                                `Face ${Math.round(conf * 100)}%`,
                                box.x,
                                box.y - 5
                            );
                        });
                        
                    } catch (error) {
                        console.warn('Detection error:', error);
                    }
                }
            }
            
            // Update stats
            const frameTime = Math.round(performance.now() - frameStart);
            document.getElementById('frame-time').textContent = frameTime + 'ms';
            document.getElementById('detections').textContent = detectionCount;
            document.getElementById('processed').textContent = frameCount;
            
            // Continue loop
            requestAnimationFrame(renderLoop);
        }

        // ============================================
        // FACE RECOGNITION (Advanced)
        // ============================================
        let labeledDescriptors = [];

        async function loadKnownFaces() {
            // This would load pre-computed face descriptors from server
            // For demo, we'll use empty array
            labeledDescriptors = [];
            console.log('Known faces loaded:', labeledDescriptors.length);
        }

        async function recognizeFace(faceDescriptor) {
            if (labeledDescriptors.length === 0) return null;
            
            const faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, CONFIG.FACE_MATCH_THRESHOLD);
            const match = faceMatcher.findBestMatch(faceDescriptor);
            
            if (match.distance < CONFIG.FACE_MATCH_THRESHOLD) {
                return {
                    name: match.label,
                    distance: match.distance
                };
            }
            return null;
        }

        function addRecognizedPerson(name) {
            if (recognizedToday.has(name)) return;
            
            recognizedToday.add(name);
            
            const list = document.getElementById('recognizedList');
            const item = document.createElement('div');
            item.className = 'recognized-item new';
            item.innerHTML = `<strong>${name}</strong><br><small>${new Date().toLocaleTimeString()}</small>`;
            
            list.insertBefore(item, list.firstChild);
            document.getElementById('recognized').textContent = recognizedToday.size;
            
            // Remove 'new' class after animation
            setTimeout(() => item.classList.remove('new'), 500);
        }

        // ============================================
        // START
        // ============================================
        init();
    </script>
</body>
</html>
