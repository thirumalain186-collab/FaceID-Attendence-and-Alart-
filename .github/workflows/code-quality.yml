name: Code Quality

on: [push, pull_request]

jobs:
  lint:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pylint
    
    - name: Run Flake8
      run: |
        flake8 . --count --show-source --statistics --max-line-length=120 --exclude=venv,__pycache__,tests,.git,build,dist
    
    - name: Run Black check
      run: |
        black --check . --exclude='/(\.git|\.venv|__pycache__|build|dist|tests|\.github)/'
    
    - name: Run Pylint
      run: |
        pylint main.py config.py database.py attendance_engine.py scheduler.py pdf_generator.py email_sender.py --disable=C0111,R0903,W0703 --max-line-length=120 || echo "Pylint completed with warnings"

  security:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Check for secrets in code
      run: |
        pip install bandit
        bandit -r . -x ./tests,.venv --severity-level=medium || echo "Bandit scan completed"
    
    - name: Verify no hardcoded credentials
      run: |
        python -c "
import re
import os
from pathlib import Path

patterns = [
    r'password\s*=\s*[\"\'](?!YOUR_|your_|<|{|$)[\w\-]{8,}',
    r'api_key\s*=\s*[\"\'](?!YOUR_|your_|<|{|$)[\w\-]{8,}',
    r'secret\s*=\s*[\"\'](?!YOUR_|your_|<|{|$)[\w\-]{8,}'
]

issues = []
for py_file in Path('.').rglob('*.py'):
    if '.venv' in str(py_file) or 'tests' in str(py_file):
        continue
    try:
        with open(py_file, 'r', encoding='utf-8') as f:
            content = f.read()
            for i, line in enumerate(content.split('\n'), 1):
                for pattern in patterns:
                    if re.search(pattern, line, re.IGNORECASE):
                        issues.append(f'{py_file}:{i}')
    except:
        pass

if issues:
    print('WARNING: Potential hardcoded credentials found:')
    for issue in issues[:10]:
        print(f'  - {issue}')
else:
    print('No hardcoded credentials detected')
"
